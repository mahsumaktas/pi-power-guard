# pi-power-guard configuration
# https://github.com/mahsumaktas/pi-power-guard
#
# Restart the service after changes:
#   sudo systemctl restart pi-power-guard

[general]
# Directory for log files
log_dir = /var/log/pi-power-guard

# Maximum lines in current.log before rotation
ring_buffer_lines = 100000

# Maximum number of archived log files to keep
max_archives = 5

# Seconds between full baseline log entries (even if nothing changed)
baseline_interval = 5

# Seconds between sensor polls (change detection resolution)
poll_interval = 1

# Seconds between fdatasync calls to flush log to disk
# Lower = less data loss on crash, higher = less disk I/O
# Recommended: 10 for NVMe, 30 for SD card
sync_interval = 10

# Directory for persistent state files (clean shutdown tracking)
state_dir = /var/lib/pi-power-guard

[thresholds]
# EXT5V voltage thresholds (nominal ~5.1V from USB-C PD)
ext5v_warn = 4.85
ext5v_low = 4.75
ext5v_critical = 4.50

# 3V3 system rail (nominal 3.3V)
3v3_sys_warn = 3.20
3v3_sys_critical = 3.10

# CPU temperature (degrees C)
cpu_temp_warn = 75.0
cpu_temp_critical = 85.0

# PMIC temperature (degrees C)
pmic_temp_warn = 70.0
pmic_temp_critical = 80.0

# NVMe temperature (degrees C)
nvme_temp_warn = 60.0
nvme_temp_critical = 70.0

[trend]
# Number of samples in the moving average window
window_size = 60

# EMA smoothing factor (0.0-1.0, lower = smoother)
ema_alpha = 0.1

# Voltage drop (V) in window that triggers a WARN
drop_threshold = 0.15

# Minimum samples before trend analysis activates
min_samples = 10

[change_detection]
# Minimum voltage change (V) to count as a state change
voltage_epsilon = 0.010

# Minimum temperature change (C) to count as a state change
temp_epsilon = 1.0

[prometheus]
# Optional: Prometheus node_exporter textfile collector directory
# Set to enable .prom file output for Prometheus/Grafana integration
# Example: /var/lib/node_exporter/textfile_collector
# Leave empty to disable
textfile_dir =
